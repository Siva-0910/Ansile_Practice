- name: Practice makes man perfect
  hosts: local
  connection: local
  vars:
    time: two
  vars_prompt:
  tasks:
  - name: Daily Practice
    ansible.builtin.debug:
      msg: "{{ time }} hour maximum"
  - name: install nginx
    ansible.builtin.package:
      name: nginx
      state: present
  - name: Start nginx
    ansible.builtin.service:
      name: nginx
      state: started    
      enabled: yes
  - name: prompt
    ansible.builtin.debug:
      msg: "please enter your name"    
  - name: print name
    ansible.builtin.debug:
      msg: "{{ prompt }}"  